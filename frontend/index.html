<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Share</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("travelShareTheme");
          var mode = localStorage.getItem("travelShareThemeMode");
          if (theme !== "light" && theme !== "dark") {
            if (mode === "dark") {
              theme = "dark";
            } else if (mode === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
              theme = "dark";
            } else {
              theme = "light";
            }
          }
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.add("has-active-theme");
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.classList.add("has-active-theme");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
