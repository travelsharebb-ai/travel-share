name: Travel Share CI (LOCKED)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: travel_share
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/travel_share
      JWT_SECRET: test-secret
      FINGERPRINT_SECRET: test-secret
      CI_QR_TOKEN: test-ci-token
      CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}
      CI_PUBLIC_KEY: ${{ secrets.CI_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch origin/main
        run: git fetch --no-tags --prune origin main

      - name: CI Workflow Integrity Check
        run: |
          # compare current workflow checksum with the repository baseline
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum .github/workflows/ci.yml | cut -d ' ' -f1 > /tmp/current.sha
          else
            shasum -a 256 .github/workflows/ci.yml | awk '{print $1}' > /tmp/current.sha
          fi
          EXPECTED=$(cut -d '=' -f2 .ci-lock/workflow.sha256)
          if [ "$(cat /tmp/current.sha)" != "$EXPECTED" ]; then
            echo "CI WORKFLOW MODIFIED - BLOCKING"
            exit 1
          fi

      - name: Origin-based immutability check
        run: |
          git fetch --no-tags --prune origin main
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.github/workflows/ci\.yml$' || true)
          if [ -n "$CHANGED" ]; then
            echo "CI modified vs origin/main: $CHANGED"
            exit 1
          else
            echo "CI stable vs origin/main"
          fi

      - name: Backend Full History Drift Check
        run: |
          git fetch --no-tags --prune origin main
          DRIFT=$(git diff --name-only origin/main...HEAD -- backend/src backend/prisma backend/scripts || true)
          if [ -n "$DRIFT" ]; then
            echo "Backend drift detected: $DRIFT"
            exit 1
          else
            echo "Backend stable vs origin/main"
          fi

      # =========================
      # Provenance and Zero-Trust artifact steps
      # =========================

      - name: Generate CI Provenance Record
        run: |
          mkdir -p .ci-provenance
          echo "commit=$(git rev-parse HEAD)" > .ci-provenance/run.txt
          echo "branch=$(git branch --show-current)" >> .ci-provenance/run.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .ci-provenance/run.txt
          echo "node=$(node -v)" >> .ci-provenance/run.txt
          echo "os=$(uname -a)" >> .ci-provenance/run.txt
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum .ci-provenance/run.txt > .ci-provenance/hash.txt
          else
            shasum -a 256 .ci-provenance/run.txt | awk '{print $1}' > .ci-provenance/hash.txt
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 1. BOOTSTRAP STAGE (ONLY SAFE MUTATIONS)
      # =========================
      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Start backend server
        run: |
          npm start &
          npx wait-on http://localhost:10000/health
        working-directory: backend

      # =========================
      # 2. AUDIT STAGE (READ ONLY)
      # =========================

      - name: Run Phase 1–3 Audit (Signed)
        run: |
          set -o pipefail
          node backend/scripts/phase-audit.mjs | tee audit.phase1-3.log
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum audit.phase1-3.log | awk '{print $1}' > audit.phase1-3.hash
          else
            shasum -a 256 audit.phase1-3.log | awk '{print $1}' > audit.phase1-3.hash
          fi
          echo "$CI_SIGNING_KEY" | base64 -d > key.pem
          chmod 600 key.pem
          openssl dgst -sha256 -sign key.pem -out audit.phase1-3.sig audit.phase1-3.log
          # verify immediately
          openssl dgst -sha256 -verify <(echo "$CI_PUBLIC_KEY" | base64 -d) -signature audit.phase1-3.sig audit.phase1-3.log

      - name: Run Phase 4 Audit (Signed)
        run: |
          set -o pipefail
          node backend/scripts/phase4-audit.mjs | tee audit.phase4.log
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum audit.phase4.log | awk '{print $1}' > audit.phase4.hash
          else
            shasum -a 256 audit.phase4.log | awk '{print $1}' > audit.phase4.hash
          fi
          echo "$CI_SIGNING_KEY" | base64 -d > key.pem
          chmod 600 key.pem
          openssl dgst -sha256 -sign key.pem -out audit.phase4.sig audit.phase4.log
          openssl dgst -sha256 -verify <(echo "$CI_PUBLIC_KEY" | base64 -d) -signature audit.phase4.sig audit.phase4.log

      - name: Hash CI Artifacts
        run: |
          # collect artifact files
          find . -type f \( -name "*.log" -o -name "*.sig" -o -name "*.hash" -o -path "./.ci-provenance/*" \) > files.txt
          > artifacts.sha
          while read -r f; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" >> artifacts.sha
            else
              shasum -a 256 "$f" | awk '{print $1 "  " "$f"}' >> artifacts.sha
            fi
          done < files.txt

      - name: Upload Immutable CI Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ci-run-${{ github.sha }}
          path: |
            audit.phase1-3.log
            audit.phase1-3.sig
            audit.phase1-3.hash
            audit.phase4.log
            audit.phase4.sig
            audit.phase4.hash
            .ci-provenance/
            artifacts.sha
