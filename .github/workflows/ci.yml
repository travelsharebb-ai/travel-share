name: Travel Share CI (LOCKED)

# NOTE: GitHub deprecated Node.js 20 on hosted runners. This workflow
# explicitly sets `node-version: 24` where Node is required so Actions
# authored for older Node targets run on Node 24 and avoid deprecation
# fallout. See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: travel_share
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/travel_share
      JWT_SECRET: test-secret
      FINGERPRINT_SECRET: test-secret
      CI_QR_TOKEN: test-ci-token

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch origin/main
        run: git fetch --no-tags --prune origin main


      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # =========================
      # 1. BOOTSTRAP STAGE (ONLY SAFE MUTATIONS)
      # =========================
      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed database (CI bootstrap)
        run: npx prisma db seed
        working-directory: backend

      - name: Start backend server
        run: |
          npm start &
          npx wait-on http://localhost:10000/health
        working-directory: backend

      # =========================
      # 2. AUDIT STAGE (READ ONLY)
      # =========================

      - name: Phase 1–3 Audit
        run: node backend/scripts/phase-audit.mjs

      - name: Phase 4 Audit
        run: node backend/scripts/phase4-audit.mjs

      # =========================
      # 3. CI Contract Layer v1 (Read-only API checks)
      # =========================
      - name: "CI Contract: Run read-only API contract checks"
        run: node backend/scripts/ci-contract-check.mjs
