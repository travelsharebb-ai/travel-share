name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: travel_share
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/travel_share
      JWT_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend

      - name: Prisma migrate
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Backend health check
        run: node backend/scripts/ci-contract-check.mjs

      - name: Smoke test
        run: echo "CI OK"